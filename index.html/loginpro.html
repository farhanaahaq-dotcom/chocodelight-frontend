<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ChocoDelight</title>
  <style>
    body {
      
      background-color: linen;
      color: saddlebrown;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background-color: bisque;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px sienna;
      width: 300px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid tan;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: peru;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background-color: sienna;
    }

    .link {
      text-align: center;
      margin-top: 10px;
    }

    .link a {
      color: saddlebrown;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Login</h2>
    <form action="">
      <input type="text" placeholder="Username" required>
      <input type="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
    <div class="link">
      <p>Don't have an account? <a href="register.html">Register</a></p>
    </div>
  </div>
</body>
</html>
